name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"
permissions:
  contents: read
jobs:
  test:
    name: Test on Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["2.5", "2.6", "2.7", "3.0", "3.1", "3.2", "3.3", "3.4", "4.0"]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          bundler: ${{ matrix.ruby == '2.5' && '2.2.28' || 'latest' }}

      - run: bundle exec rbs collection install
        if: ${{ matrix.ruby >= '3.0' }}

      - run: bundle exec rake test

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write # To report GitHub Actions status checks
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: "3"
          bundler-cache: true

      - run: bundle exec rubocop --debug

      - uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: "true"
          VALIDATE_RUBY: "false"
          VALIDATE_JSCPD: "false"
          VALIDATE_NATURAL_LANGUAGE: "false"
          VALIDATE_YAML_PRETTIER: "false"
          VALIDATE_TRIVY: "false"
          VALIDATE_BIOME_FORMAT: "false"
          VALIDATE_BIOME_LINT: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
